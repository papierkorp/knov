basePath: /
definitions:
  configmanager.SettingOption:
    properties:
      label:
        description: display text; falls back to Value when empty
        type: string
      value:
        type: string
    type: object
  dashboard.Dashboard:
    properties:
      id:
        type: string
      layout:
        $ref: '#/definitions/dashboard.Layout'
      name:
        type: string
      widgets:
        items:
          $ref: '#/definitions/dashboard.Widget'
        type: array
    type: object
  dashboard.FileContentConfig:
    properties:
      filePath:
        type: string
    type: object
  dashboard.FilterConfig:
    properties:
      criteria:
        items:
          $ref: '#/definitions/filter.Criteria'
        type: array
      display:
        description: list, cards, dropdown, content
        type: string
      limit:
        type: integer
      logic:
        type: string
    type: object
  dashboard.Layout:
    enum:
    - oneColumn
    - twoColumns
    - threeColumns
    - fourColumns
    - custom
    type: string
    x-enum-varnames:
    - OneColumn
    - TwoColumns
    - ThreeColumns
    - FourColumns
    - Custom
  dashboard.StaticConfig:
    properties:
      content:
        type: string
      format:
        description: html, markdown, text
        type: string
    type: object
  dashboard.Widget:
    properties:
      config:
        $ref: '#/definitions/dashboard.WidgetConfig'
      id:
        type: string
      position:
        $ref: '#/definitions/dashboard.WidgetPosition'
      title:
        type: string
      type:
        $ref: '#/definitions/dashboard.WidgetType'
    type: object
  dashboard.WidgetConfig:
    properties:
      fileContent:
        $ref: '#/definitions/dashboard.FileContentConfig'
      filter:
        $ref: '#/definitions/dashboard.FilterConfig'
      static:
        $ref: '#/definitions/dashboard.StaticConfig'
    type: object
  dashboard.WidgetPosition:
    properties:
      x:
        type: integer
      "y":
        type: integer
    type: object
  dashboard.WidgetType:
    enum:
    - filter
    - filterForm
    - fileContent
    - static
    - tags
    - collections
    - folders
    type: string
    x-enum-varnames:
    - WidgetTypeFilter
    - WidgetTypeFilterForm
    - WidgetTypeFileContent
    - WidgetTypeStatic
    - WidgetTypeTags
    - WidgetTypeCollections
    - WidgetTypeFolders
  files.BrokenLink:
    properties:
      sourceFile:
        type: string
      suggested:
        type: string
      target:
        type: string
    type: object
  files.CollectionCount:
    additionalProperties:
      type: integer
    type: object
  files.EditorType:
    enum:
    - toastui-editor
    - textarea-editor
    - filter-editor
    - list-editor
    - todo-editor
    - index-editor
    - codemirror-editor
    type: string
    x-enum-varnames:
    - EditorTypeToastUI
    - EditorTypeTextarea
    - EditorTypeFilter
    - EditorTypeList
    - EditorTypeTodo
    - EditorTypeIndex
    - EditorTypeCodeMirror
  files.EditorTypeCount:
    additionalProperties:
      type: integer
    type: object
  files.File:
    properties:
      metadata:
        $ref: '#/definitions/files.Metadata'
      name:
        type: string
      path:
        type: string
    type: object
  files.FolderCount:
    additionalProperties:
      type: integer
    type: object
  files.Metadata:
    properties:
      ancestor:
        description: auto
        items:
          type: string
        type: array
      collection:
        description: auto
        type: string
      conflictFile:
        description: auto
        type: string
      conflictOf:
        description: auto
        type: string
      createdAt:
        description: auto
        type: string
      editor:
        allOf:
        - $ref: '#/definitions/files.EditorType'
        description: manual
      folders:
        description: auto
        items:
          type: string
        type: array
      kanbanAddedAt:
        description: auto
        type: string
      kanbanMovedAt:
        description: auto
        type: string
      kids:
        description: auto
        items:
          type: string
        type: array
      lastEdited:
        description: auto
        type: string
      linksToHere:
        description: auto
        items:
          type: string
        type: array
      parents:
        description: manual
        items:
          type: string
        type: array
      path:
        description: auto
        type: string
      references:
        description: manual
        items:
          $ref: '#/definitions/files.Reference'
        type: array
      related:
        description: auto
        items:
          type: string
        type: array
      size:
        description: auto
        type: integer
      tags:
        description: manual
        items:
          type: string
        type: array
      title:
        description: auto
        type: string
      usedLinks:
        description: auto
        items:
          type: string
        type: array
    type: object
  files.Reference:
    properties:
      addedAt:
        type: string
      description:
        description: why this link was added
        type: string
      url:
        type: string
    type: object
  files.TagCount:
    additionalProperties:
      type: integer
    type: object
  filter.Config:
    properties:
      criteria:
        items:
          $ref: '#/definitions/filter.Criteria'
        type: array
      display:
        description: list, cards, dropdown, content
        type: string
      limit:
        type: integer
      logic:
        type: string
    type: object
  filter.Criteria:
    properties:
      action:
        type: string
      metadata:
        type: string
      operator:
        type: string
      value:
        type: string
    type: object
  filter.Result:
    properties:
      files:
        items:
          $ref: '#/definitions/files.File'
        type: array
      filter_count:
        type: integer
      logic:
        type: string
      total:
        type: integer
    type: object
  job.JobRun:
    properties:
      error:
        type: string
      finishedAt:
        type: string
      name:
        type: string
      output: {}
      startedAt:
        type: string
      status:
        $ref: '#/definitions/job.JobStatus'
    type: object
  job.JobStatus:
    enum:
    - running
    - ok
    - error
    type: string
    x-enum-varnames:
    - JobStatusRunning
    - JobStatusOK
    - JobStatusError
  notificationStorage.Notification:
    properties:
      created_at:
        type: string
      id:
        type: string
      level:
        type: string
      message:
        type: string
      pending:
        type: boolean
    type: object
  server.bulkUpdatePatch:
    properties:
      editor:
        $ref: '#/definitions/files.EditorType'
      tagsAdd:
        items:
          type: string
        type: array
      tagsRemove:
        items:
          type: string
        type: array
    type: object
  server.bulkUpdateRequest:
    properties:
      filter:
        $ref: '#/definitions/filter.Config'
      patch:
        $ref: '#/definitions/server.bulkUpdatePatch'
      preview:
        type: boolean
    type: object
  server.bulkUpdateResult:
    properties:
      count:
        type: integer
      preview:
        type: boolean
      updated:
        items:
          type: string
        type: array
    type: object
  server.sectionJSON:
    properties:
      key:
        type: string
      label:
        type: string
      settings:
        items:
          $ref: '#/definitions/server.settingJSON'
        type: array
    type: object
  server.settingJSON:
    properties:
      desc:
        type: string
      dynUrl:
        type: string
      group:
        type: string
      key:
        type: string
      label:
        type: string
      options:
        items:
          $ref: '#/definitions/configmanager.SettingOption'
        type: array
      type:
        type: string
      value: {}
    type: object
  test.CaseResult:
    properties:
      actual:
        type: string
      detail: {}
      error:
        type: string
      expected:
        type: string
      name:
        type: string
      success:
        type: boolean
    type: object
  test.SuiteResult:
    properties:
      cases:
        items:
          $ref: '#/definitions/test.CaseResult'
        type: array
      failed:
        type: integer
      passed:
        type: integer
      success:
        type: boolean
      suite:
        type: string
      total:
        type: integer
    type: object
host: localhost:1324
info:
  contact: {}
  description: KNOV API \n http://localhost:1324
  title: Knov API
  version: "1.0"
paths:
  /api/chat/bulk-form:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: Concatenates selected messages and moves them to a new or existing
        file
      parameters:
      - description: Comma-separated message IDs
        in: formData
        name: ids
        required: true
        type: string
      - description: 'Mode: new or append'
        in: formData
        name: mode
        required: true
        type: string
      - description: Target filename (new) or existing file path (append)
        in: formData
        name: target
        required: true
        type: string
      - description: Editor type for new files
        in: formData
        name: editor
        type: string
      - description: 'Form mode: new or append'
        in: query
        name: mode
        required: true
        type: string
      produces:
      - application/json
      - text/html
      - text/html
      responses: {}
      summary: Get bulk move form HTML
      tags:
      - chat
      - chat
  /api/chat/messages:
    get:
      description: Returns the full chat component with message history and input
      parameters:
      - description: File path to scope chat to (empty = global chat)
        in: query
        name: file
        type: string
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Use compact timestamp (time only, no date)
        in: query
        name: short
        type: boolean
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get chat component HTML
      tags:
      - chat
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new message in the global or file-scoped chat
      parameters:
      - description: File path to scope message to (empty = global chat)
        in: query
        name: file
        type: string
      - description: Message content
        in: formData
        name: chat-input
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Post a new chat message
      tags:
      - chat
  /api/chat/messages/{id}:
    delete:
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: empty — element removed via hx-swap outerHTML
          schema:
            type: string
      summary: Delete a chat message
      tags:
      - chat
    get:
      description: Used to restore the message element after cancelling the move form
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get a single chat message
      tags:
      - chat
  /api/chat/messages/{id}/move:
    get:
      description: Returns either the new-file form or append form depending on mode
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Form mode: new or append'
        in: query
        name: mode
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get move form for a chat message
      tags:
      - chat
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new file or appends to an existing one, then deletes
        the message
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Mode: new or append'
        in: formData
        name: mode
        required: true
        type: string
      - description: Target filename (new) or existing file path (append)
        in: formData
        name: target
        required: true
        type: string
      - description: Editor type for new files (e.g. toastui-editor, todo-editor)
        in: formData
        name: editor
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Move a chat message to a file
      tags:
      - chat
  /api/chat/messages/bulk:
    delete:
      consumes:
      - application/x-www-form-urlencoded
      parameters:
      - description: Comma-separated message IDs
        in: formData
        name: ids
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Bulk delete chat messages
      tags:
      - chat
  /api/chat/messages/bulk/move:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Concatenates selected messages and moves them to a new or existing
        file
      parameters:
      - description: Comma-separated message IDs
        in: formData
        name: ids
        required: true
        type: string
      - description: 'Mode: new or append'
        in: formData
        name: mode
        required: true
        type: string
      - description: Target filename (new) or existing file path (append)
        in: formData
        name: target
        required: true
        type: string
      - description: Editor type for new files
        in: formData
        name: editor
        type: string
      - description: 'Form mode: new or append'
        in: query
        name: mode
        required: true
        type: string
      produces:
      - application/json
      - text/html
      - text/html
      responses: {}
      summary: Get bulk move form HTML
      tags:
      - chat
      - chat
  /api/components/table:
    get:
      description: Returns paginated, sortable, searchable table HTML fragment for
        a markdown file
      parameters:
      - description: File path
        in: query
        name: filepath
        required: true
        type: string
      - default: 0
        description: Table index (0-based)
        in: query
        name: tableindex
        type: integer
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: size
        type: integer
      - default: -1
        description: Column index to sort by
        in: query
        name: sort
        type: integer
      - default: asc
        description: Sort order (asc/desc)
        in: query
        name: order
        type: string
      - description: Search query
        in: query
        name: search
        type: string
      - collectionFormat: csv
        description: Column filter, repeatable, format '<columnIndex>:<value>'
        in: query
        items:
          type: string
        name: filter
        type: array
      produces:
      - text/html
      responses:
        "200":
          description: table html fragment
          schema:
            type: string
        "400":
          description: invalid parameters
          schema:
            type: string
        "500":
          description: failed to process table
          schema:
            type: string
      summary: Get paginated table
      tags:
      - components
  /api/config:
    get:
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get current configuration
      tags:
      - config
  /api/config/datapath:
    get:
      produces:
      - text/html
      responses: {}
      summary: Get current data path as input field
      tags:
      - config
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: updates data path in .env file (requires restart)
      parameters:
      - description: data path
        in: formData
        name: dataPath
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: saved
          schema:
            type: string
      summary: Update data path
      tags:
      - config
  /api/config/export:
    get:
      description: Downloads the current user settings as a JSON file
      produces:
      - application/json
      responses: {}
      summary: Export user settings as JSON
      tags:
      - config
  /api/config/favicon:
    delete:
      consumes:
      - application/x-www-form-urlencoded
      description: Removes the custom favicon and reverts to the default
      produces:
      - text/html
      responses:
        "200":
          description: favicon removed
          schema:
            type: string
        "500":
          description: failed to remove
          schema:
            type: string
      summary: Delete custom favicon
      tags:
      - config
    post:
      consumes:
      - multipart/form-data
      description: Uploads a custom favicon (ico, png, or svg) stored in storage/favicon
      parameters:
      - description: Favicon file (.ico, .png, or .svg)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - text/html
      responses:
        "200":
          description: favicon uploaded
          schema:
            type: string
        "400":
          description: invalid file
          schema:
            type: string
        "500":
          description: upload failed
          schema:
            type: string
      summary: Upload custom favicon
      tags:
      - config
  /api/config/import:
    post:
      consumes:
      - multipart/form-data
      description: Uploads and applies user settings from a JSON file
      parameters:
      - description: Settings JSON file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - text/html
      responses: {}
      summary: Import user settings from JSON
      tags:
      - config
  /api/config/languages:
    get:
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get available languages
      tags:
      - config
  /api/config/repository:
    get:
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Get git remote URL
      tags:
      - config
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: updates git remote url in .env file
      parameters:
      - description: remote repository url
        in: formData
        name: repositoryURL
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: saved
          schema:
            type: string
      summary: Update git remote URL
      tags:
      - config
  /api/cronjob:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Manually triggers the cronjob execution (file processing and search
        indexing)
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: '{"status":"ok","message":"cronjob executed successfully"}'
          schema:
            type: string
        "409":
          description: already running
          schema:
            type: string
      summary: Run cronjob
      tags:
      - cronjob
  /api/dashboards:
    get:
      description: Get list of all dashboards for current user
      parameters:
      - description: Show shortened dashboard names (3 chars max)
        in: query
        name: short
        type: boolean
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dashboard.Dashboard'
            type: array
      summary: Get all dashboards
      tags:
      - dashboards
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Create a new dashboard with optional widgets
      parameters:
      - description: Dashboard name
        in: formData
        name: name
        required: true
        type: string
      - description: Dashboard layout (oneColumn, twoColumns, threeColumns, fourColumns)
        in: formData
        name: layout
        required: true
        type: string
      - description: Widget type (filter, filterForm, fileContent, static, tags, collections,
          folders)
        in: formData
        name: widgets[0][type]
        type: string
      - description: Widget title
        in: formData
        name: widgets[0][title]
        type: string
      - description: Widget X position
        in: formData
        name: widgets[0][position][x]
        type: integer
      - description: Widget Y position
        in: formData
        name: widgets[0][position][y]
        type: integer
      - description: Widget configuration JSON
        in: formData
        name: widgets[0][config]
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: dashboard created
          schema:
            type: string
      summary: Create new dashboard
      tags:
      - dashboards
  /api/dashboards/{id}:
    delete:
      description: Delete dashboard by ID
      parameters:
      - description: Dashboard ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: dashboard deleted
          schema:
            type: string
      summary: Delete dashboard
      tags:
      - dashboards
    get:
      description: Get dashboard by ID
      parameters:
      - description: Dashboard ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dashboard.Dashboard'
      summary: Get specific dashboard
      tags:
      - dashboards
    patch:
      consumes:
      - application/x-www-form-urlencoded
      description: Update existing dashboard
      parameters:
      - description: Dashboard ID
        in: path
        name: id
        required: true
        type: string
      - description: Dashboard name
        in: formData
        name: name
        type: string
      - description: Dashboard layout (oneColumn, twoColumns, threeColumns, fourColumns)
        in: formData
        name: layout
        type: string
      - description: Widget type
        in: formData
        name: widgets[0][type]
        type: string
      - description: Widget title
        in: formData
        name: widgets[0][title]
        type: string
      - description: Widget X position
        in: formData
        name: widgets[0][position][x]
        type: integer
      - description: Widget Y position
        in: formData
        name: widgets[0][position][y]
        type: integer
      - description: Widget configuration JSON
        in: formData
        name: widgets[0][config]
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dashboard.Dashboard'
      summary: Update dashboard
      tags:
      - dashboards
  /api/dashboards/{id}/export:
    get:
      description: Export a dashboard definition as a downloadable JSON file
      parameters:
      - description: Dashboard ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dashboard.Dashboard'
        "404":
          description: dashboard not found
          schema:
            type: string
      summary: Export dashboard as JSON
      tags:
      - dashboards
  /api/dashboards/{id}/rename:
    post:
      consumes:
      - application/x-www-form-urlencoded
      parameters:
      - description: dashboard id
        in: path
        name: id
        required: true
        type: string
      - description: new dashboard name
        in: formData
        name: name
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: dashboard renamed
          schema:
            type: string
      summary: Rename dashboard
      tags:
      - dashboards
  /api/dashboards/form:
    get:
      description: Get dashboard form for create or edit
      parameters:
      - description: Dashboard ID for edit mode
        in: query
        name: id
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: dashboard form html
          schema:
            type: string
      summary: Get dashboard form
      tags:
      - dashboards
  /api/dashboards/import:
    post:
      consumes:
      - multipart/form-data
      description: Import a dashboard from an uploaded JSON file
      parameters:
      - description: Dashboard JSON file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: dashboard imported
          schema:
            type: string
        "400":
          description: invalid file
          schema:
            type: string
      summary: Import dashboard from JSON
