basePath: /
definitions:
  dashboard.Dashboard:
    properties:
      id:
        type: string
      layout:
        $ref: '#/definitions/dashboard.Layout'
      name:
        type: string
      widgets:
        items:
          $ref: '#/definitions/dashboard.Widget'
        type: array
    type: object
  dashboard.FileContentConfig:
    properties:
      filePath:
        type: string
    type: object
  dashboard.FilterConfig:
    properties:
      criteria:
        items:
          $ref: '#/definitions/filter.Criteria'
        type: array
      display:
        description: list, cards, dropdown, content
        type: string
      limit:
        type: integer
      logic:
        type: string
    type: object
  dashboard.Layout:
    enum:
    - oneColumn
    - twoColumns
    - threeColumns
    - fourColumns
    - custom
    type: string
    x-enum-varnames:
    - OneColumn
    - TwoColumns
    - ThreeColumns
    - FourColumns
    - Custom
  dashboard.StaticConfig:
    properties:
      content:
        type: string
      format:
        description: html, markdown, text
        type: string
    type: object
  dashboard.Widget:
    properties:
      config:
        $ref: '#/definitions/dashboard.WidgetConfig'
      id:
        type: string
      position:
        $ref: '#/definitions/dashboard.WidgetPosition'
      title:
        type: string
      type:
        $ref: '#/definitions/dashboard.WidgetType'
    type: object
  dashboard.WidgetConfig:
    properties:
      fileContent:
        $ref: '#/definitions/dashboard.FileContentConfig'
      filter:
        $ref: '#/definitions/dashboard.FilterConfig'
      static:
        $ref: '#/definitions/dashboard.StaticConfig'
    type: object
  dashboard.WidgetPosition:
    properties:
      x:
        type: integer
      "y":
        type: integer
    type: object
  dashboard.WidgetType:
    enum:
    - filter
    - filterForm
    - fileContent
    - static
    - tags
    - collections
    - folders
    type: string
    x-enum-varnames:
    - WidgetTypeFilter
    - WidgetTypeFilterForm
    - WidgetTypeFileContent
    - WidgetTypeStatic
    - WidgetTypeTags
    - WidgetTypeCollections
    - WidgetTypeFolders
  files.CollectionCount:
    additionalProperties:
      type: integer
    type: object
  files.EditorType:
    enum:
    - markdown-editor
    - textarea-editor
    - filter-editor
    - list-editor
    - todo-editor
    - index-editor
    type: string
    x-enum-varnames:
    - EditorTypeMarkdown
    - EditorTypeTextarea
    - EditorTypeFilter
    - EditorTypeList
    - EditorTypeTodo
    - EditorTypeIndex
  files.EditorTypeCount:
    additionalProperties:
      type: integer
    type: object
  files.File:
    properties:
      metadata:
        $ref: '#/definitions/files.Metadata'
      name:
        type: string
      path:
        type: string
    type: object
  files.FolderCount:
    additionalProperties:
      type: integer
    type: object
  files.Metadata:
    properties:
      ancestor:
        description: auto
        items:
          type: string
        type: array
      collection:
        description: auto
        type: string
      createdAt:
        description: auto
        type: string
      editor:
        allOf:
        - $ref: '#/definitions/files.EditorType'
        description: manual - with add new
      folders:
        description: auto
        items:
          type: string
        type: array
      kids:
        description: auto
        items:
          type: string
        type: array
      lastEdited:
        description: auto
        type: string
      linksToHere:
        description: auto
        items:
          type: string
        type: array
      parents:
        description: manual
        items:
          type: string
        type: array
      path:
        description: auto
        type: string
      references:
        description: manual
        items:
          $ref: '#/definitions/files.Reference'
        type: array
      related:
        description: auto - pre-computed by rebuild
        items:
          type: string
        type: array
      size:
        description: auto
        type: integer
      tags:
        description: manual
        items:
          type: string
        type: array
      title:
        description: auto
        type: string
      usedLinks:
        description: auto
        items:
          type: string
        type: array
    type: object
  files.Reference:
    properties:
      description:
        description: why this link was added
        type: string
      url:
        type: string
    type: object
  files.TagCount:
    additionalProperties:
      type: integer
    type: object
  filter.Config:
    properties:
      criteria:
        items:
          $ref: '#/definitions/filter.Criteria'
        type: array
      display:
        description: list, cards, dropdown, content
        type: string
      limit:
        type: integer
      logic:
        type: string
    type: object
  filter.Criteria:
    properties:
      action:
        type: string
      metadata:
        type: string
      operator:
        type: string
      value:
        type: string
    type: object
  filter.Result:
    properties:
      files:
        items:
          $ref: '#/definitions/files.File'
        type: array
      filter_count:
        type: integer
      logic:
        type: string
      total:
        type: integer
    type: object
  testdata.FilterTestResult:
    properties:
      actual_count:
        type: integer
      actual_files:
        items:
          type: string
        type: array
      config:
        $ref: '#/definitions/filter.Config'
      config_name:
        type: string
      description:
        type: string
      error:
        type: string
      expected_count:
        type: integer
      expected_files:
        items:
          type: string
        type: array
      success:
        type: boolean
    type: object
  testdata.FilterTestResults:
    properties:
      failed_tests:
        type: integer
      log_file:
        type: string
      passed_tests:
        type: integer
      results:
        items:
          $ref: '#/definitions/testdata.FilterTestResult'
        type: array
      success:
        type: boolean
      total_tests:
        type: integer
    type: object
host: localhost:1324
info:
  contact: {}
  description: KNOV API \n http://localhost:1324
  title: Knov API
  version: "1.0"
paths:
  /api/chat/bulk-form:
    get:
      consumes:
      - application/x-www-form-urlencoded
      description: Concatenates selected messages and moves them to a new or existing
        file
      parameters:
      - description: Comma-separated message IDs
        in: formData
        name: ids
        required: true
        type: string
      - description: 'Mode: new or append'
        in: formData
        name: mode
        required: true
        type: string
      - description: Target filename (new) or existing file path (append)
        in: formData
        name: target
        required: true
        type: string
      - description: Editor type for new files
        in: formData
        name: editor
        type: string
      - description: 'Form mode: new or append'
        in: query
        name: mode
        required: true
        type: string
      produces:
      - application/json
      - text/html
      - text/html
      responses: {}
      summary: Get bulk move form HTML
      tags:
      - chat
      - chat
  /api/chat/messages:
    get:
      description: Returns the full chat component with message history and input
      parameters:
      - description: File path to scope chat to (empty = global chat)
        in: query
        name: file
        type: string
      - description: Pagination offset (default 0)
        in: query
        name: offset
        type: integer
      - description: Use compact timestamp (time only, no date)
        in: query
        name: short
        type: boolean
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get chat component HTML
      tags:
      - chat
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new message in the global or file-scoped chat
      parameters:
      - description: File path to scope message to (empty = global chat)
        in: query
        name: file
        type: string
      - description: Message content
        in: formData
        name: chat-input
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Post a new chat message
      tags:
      - chat
  /api/chat/messages/{id}:
    delete:
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: empty — element removed via hx-swap outerHTML
          schema:
            type: string
      summary: Delete a chat message
      tags:
      - chat
    get:
      description: Used to restore the message element after cancelling the move form
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get a single chat message
      tags:
      - chat
  /api/chat/messages/{id}/move:
    get:
      description: Returns either the new-file form or append form depending on mode
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Form mode: new or append'
        in: query
        name: mode
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get move form for a chat message
      tags:
      - chat
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new file or appends to an existing one, then deletes
        the message
      parameters:
      - description: Message ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Mode: new or append'
        in: formData
        name: mode
        required: true
        type: string
      - description: Target filename (new) or existing file path (append)
        in: formData
        name: target
        required: true
        type: string
      - description: Editor type for new files (e.g. markdown-editor, todo-editor)
        in: formData
        name: editor
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Move a chat message to a file
      tags:
      - chat
  /api/chat/messages/bulk:
    delete:
      consumes:
      - application/x-www-form-urlencoded
      parameters:
      - description: Comma-separated message IDs
        in: formData
        name: ids
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Bulk delete chat messages
      tags:
      - chat
  /api/chat/messages/bulk/move:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Concatenates selected messages and moves them to a new or existing
        file
      parameters:
      - description: Comma-separated message IDs
        in: formData
        name: ids
        required: true
        type: string
      - description: 'Mode: new or append'
        in: formData
        name: mode
        required: true
        type: string
      - description: Target filename (new) or existing file path (append)
        in: formData
        name: target
        required: true
        type: string
      - description: Editor type for new files
        in: formData
        name: editor
        type: string
      - description: 'Form mode: new or append'
        in: query
        name: mode
        required: true
        type: string
      produces:
      - application/json
      - text/html
      - text/html
      responses: {}
      summary: Get bulk move form HTML
      tags:
      - chat
      - chat
  /api/components/table:
    get:
      description: Returns paginated, sortable, searchable table HTML fragment for
        a markdown file
      parameters:
      - description: File path
        in: query
        name: filepath
        required: true
        type: string
      - default: 0
        description: Table index (0-based)
        in: query
        name: tableindex
        type: integer
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 25
        description: Items per page
        in: query
        name: size
        type: integer
      - default: -1
        description: Column index to sort by
        in: query
        name: sort
        type: integer
      - default: asc
        description: Sort order (asc/desc)
        in: query
        name: order
        type: string
      - description: Search query
        in: query
        name: search
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: table html fragment
          schema:
            type: string
        "400":
          description: invalid parameters
          schema:
            type: string
        "500":
          description: failed to process table
          schema:
            type: string
      summary: Get paginated table
      tags:
      - components
  /api/config:
    get:
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Get current configuration
      tags:
      - config
  /api/config/code-block-wrap:
    post:
      consumes:
      - application/x-www-form-urlencoded
      parameters:
      - description: Whether code blocks should wrap long lines
        in: formData
        name: codeBlockWrap
        required: true
        type: boolean
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Update code block wrap setting
      tags:
      - config
  /api/config/datapath:
    get:
      produces:
      - text/html
      responses: {}
      summary: Get current data path as input field
      tags:
      - config
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: updates data path in .env file (requires restart)
      parameters:
      - description: data path
        in: formData
        name: dataPath
        required: true
        type: string
      produces:
      - application/json
      - text/html
      responses:
        "200":
          description: saved
          schema:
            type: string
      summary: Update data path
      tags:
      - config
  /api/config/extensions/index:
    post:
      consumes:
      - application/x-www-form-urlencoded
      parameters:
      - description: Whether to use .index extension
        in: formData
        name: useExtensionIndex
        required: true
        type: boolean
      produces:
      - application/json
      - text/html
      responses: {}
      summary: Update use extension for index files
      tags:
      - config
  /api/config/extensions/list:
    post:
      consumes:
      - application/x-www-form-urlencoded
      parameters:
      - description: Whether to use .list extension
        in: formData
        name: useExtensionList
        required: true
        type: boolean
      produces:
